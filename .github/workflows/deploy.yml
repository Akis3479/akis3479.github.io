name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - master # Triggers automatically when you merge a PR to master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives GitHub permission to push the compiled code

    # Tell GitHub to run these commands inside the inner Portfolio folder
    defaults:
      run:
        working-directory: ./Portfolio 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Tell gh-pages exactly where to find the built dist folder from the root
          publish_dir: ./Portfolio/dist